<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏕️ CampCheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#e8dfd0;--surface:#f5f0e8;--surface2:#faf7f2;--border:#c8b89a;--border2:#ddd0bc;
  --text:#2a1e0e;--muted:#8a7a62;--nav:#1e2d1a;
  --green:#3a5a40;--green-lt:#5d8a62;--green-bg:#d4e8d0;
  --accent:#c4621d;--accent-bg:#f5e0d0;
  --yellow:#b07a0a;--yellow-bg:#f5edd0;
  --red:#a83232;--red-bg:#f5d8d8;
  --blue:#2a5a7a;--blue-bg:#d0e4f0;
  --radius:8px;--shadow:0 2px 8px rgba(42,30,14,.1);--shadow-lg:0 4px 20px rgba(42,30,14,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── HEADER ── */
header{background:var(--nav);padding:0 16px;display:flex;align-items:center;gap:14px;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:#b8d8b8;white-space:nowrap;flex-shrink:0}
nav{display:flex;gap:2px;flex:1;overflow-x:auto}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;cursor:pointer;color:#889a88;font-size:12px;font-family:inherit;padding:5px 10px;border-radius:6px;transition:all .15s;white-space:nowrap;font-weight:500}
nav button:hover{background:rgba(255,255,255,.08);color:#c8e0c8}
nav button.active{background:rgba(255,255,255,.14);color:#fff;font-weight:700}

/* ── SYNC BADGE ── */
#sync-badge{display:none;align-items:center;gap:5px;padding:4px 9px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid transparent;transition:all .3s}
#sync-badge.s-ok{background:rgba(58,90,64,.6);border-color:#5a8a60;color:#a8d8a8}
#sync-badge.s-pend{background:rgba(176,122,10,.4);border-color:#c09030;color:#f0d080}
#sync-badge.s-sync{background:rgba(196,98,29,.4);border-color:#d07030;color:#f0b080}
#sync-badge.s-err{background:rgba(168,50,50,.5);border-color:#c05050;color:#f0a0a0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .9s linear infinite}

/* ── LOGIN AREA ── */
#login-area{position:relative;flex-shrink:0}
#login-toggle{background:none;border:1px solid rgba(255,255,255,.2);cursor:pointer;color:#c8e0c8;font-size:12px;font-family:inherit;padding:5px 10px;border-radius:6px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
#login-toggle:hover{background:rgba(255,255,255,.1)}
#login-dropdown{position:absolute;top:42px;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow-lg);min-width:200px;z-index:200;display:none}
#login-dropdown.open{display:block}
#login-dropdown input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;margin-bottom:7px;background:var(--surface)}
#login-dropdown input:focus{outline:none;border-color:var(--green-lt)}
.ld-btns{display:flex;gap:6px}
#logged-in-info{display:none;align-items:center;gap:8px}
.user-chip-sm{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:600;color:#fff}
.role-badge{font-size:10px;padding:1px 5px;border-radius:99px;background:rgba(255,255,255,.25);font-weight:700}
#logout-btn{background:none;border:1px solid rgba(255,255,255,.2);cursor:pointer;color:#c8e0c8;font-size:11px;padding:3px 8px;border-radius:5px;font-family:inherit}
#logout-btn:hover{background:var(--red);border-color:var(--red)}

/* ── LAYOUT ── */
main{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── SHARED ── */
.page-title{font-family:'Playfair Display',serif;font-size:21px;color:var(--green);margin-bottom:18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-lt)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #e0b0b0}.btn-danger:hover{background:var(--red);color:#fff}
.btn-warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid #e0cc80}.btn-warn:hover{background:var(--yellow);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px 5px;border-radius:4px;transition:all .15s;font-size:13px;line-height:1}
.btn-icon:hover{color:var(--red);background:var(--red-bg)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
.form-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green-lt);box-shadow:0 0 0 3px rgba(93,138,98,.15)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-bg);color:var(--green)}.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:#e4ddd4;color:var(--muted)}.badge-admin{background:#2a1e0e;color:#f0d090}
.progress-bar{height:8px;background:var(--border2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s}
.user-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.stoggle{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.stoggle-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;font-weight:700;color:var(--green);font-size:14px}
.stoggle-hd:hover{background:var(--green-bg)}
.stoggle-bd{padding:16px;border-top:1px solid var(--border2);display:none}
.stoggle-bd.open{display:block}
.sarrow{transition:transform .2s;font-size:11px;color:var(--muted)}
.sarrow.open{transform:rotate(180deg)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.auth-gate{background:var(--yellow-bg);border:1px solid #ddc880;border-radius:var(--radius);padding:12px 16px;color:var(--yellow);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.history-badge{font-size:10px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:4px;border:1px solid var(--border2)}

/* ── TRIPS ── */
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.trip-card{background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border2);box-shadow:var(--shadow);padding:16px 18px;transition:all .15s;position:relative}
.trip-card:hover{box-shadow:var(--shadow-lg);border-color:var(--green-lt);transform:translateY(-1px)}
.trip-card.cancelled{opacity:.6}
.trip-date{font-family:'Courier Prime',monospace;font-size:12px;color:var(--accent);font-weight:700}
.trip-name{font-size:16px;font-weight:700;margin:4px 0 2px}
.trip-loc{font-size:12px;color:var(--muted);margin-bottom:10px;min-height:16px}
.trip-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trip-card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.trip-card:hover .trip-card-actions{opacity:1}
.trip-history{font-size:10px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border2)}

/* ── USERS ── */
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.user-card{background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border2);padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.user-info{flex:1;min-width:0}
.user-name{font-size:15px;font-weight:700}
.user-meta{font-size:12px;color:var(--muted)}

/* ── ITEMS ── */
.item-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.item-tab{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:99px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;color:var(--muted)}
.item-tab:hover{border-color:var(--green-lt);color:var(--green)}
.item-tab.active{background:var(--green);border-color:var(--green);color:#fff}
.cat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:3px 8px;background:var(--bg);border-radius:4px;display:inline-block;margin-bottom:7px}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;margin-bottom:5px}
.item-name{flex:1;font-weight:500}
.item-qty{font-family:'Courier Prime',monospace;font-size:12px;color:var(--muted);white-space:nowrap}

/* ── CHECKLIST ── */
.cl-top{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:7px;margin-bottom:5px;border:1px solid var(--border2);background:var(--surface2);transition:background .2s,border-color .2s}
.check-row.is-planned{background:var(--yellow-bg);border-color:#ddc880}
.check-row.is-packed{background:var(--green-bg);border-color:#98c898}
.check-item-name{flex:1;font-weight:500}
.check-item-meta{font-size:11px;color:var(--muted)}
.ck-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.ck-btn.on-plan{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow)}
.ck-btn.on-pack{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.ck-btn:disabled{opacity:.4;cursor:not-allowed}
.cl-stats{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);margin-bottom:16px}
.stat-num{font-size:22px;font-weight:700;font-family:'Courier Prime',monospace;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--muted)}

/* ── CROSS CHECK ── */
.cross-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.p-card{background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border2);padding:13px 15px;box-shadow:var(--shadow)}
.p-card-name{font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;font-size:14px}
.cross-tbl{width:100%;border-collapse:collapse;background:var(--surface2);border-radius:var(--radius);overflow:hidden;font-size:13px}
.cross-tbl th{background:var(--green);color:#fff;padding:8px 11px;text-align:center;font-size:12px;font-weight:600;white-space:nowrap}
.cross-tbl th:first-child{text-align:left;min-width:150px}
.cross-tbl td{padding:7px 11px;border-bottom:1px solid var(--border2);text-align:center}
.cross-tbl td:first-child{text-align:left;font-weight:500}
.cross-tbl tr:last-child td{border-bottom:none}
.cross-tbl tr:hover td{background:var(--surface)}
.cross-tbl .cat-tr td{background:var(--bg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:5px 11px}
.warn-item{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;border-radius:6px;margin-bottom:7px;border:1px solid}
.warn-dup{background:var(--yellow-bg);border-color:#ddc880}
.warn-miss{background:var(--red-bg);border-color:#e0b0b0}
.warn-ok{background:var(--green-bg);border-color:#98c898}

/* ── COMMENTS ── */
.comment-thread{margin-top:8px}
.comment{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.comment.depth-1{margin-left:24px;border-left:3px solid var(--green-bg)}
.comment.depth-2{margin-left:48px;border-left:3px solid var(--yellow-bg)}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.comment-author{font-weight:700;font-size:13px}
.comment-date{font-size:11px;color:var(--muted)}
.edited-mark{font-size:10px;color:var(--muted);font-style:italic}
.comment-content{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.comment-actions{display:flex;gap:6px;margin-top:8px}
.comment-actions button{background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:2px 6px;border-radius:4px;font-family:inherit;transition:all .15s}
.comment-actions button:hover{background:var(--bg);color:var(--text)}
.comment-actions .del-btn:hover{color:var(--red)}
.reply-form{margin-top:10px;background:var(--surface);border-radius:6px;padding:10px}
.reply-form textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px;margin-bottom:7px}
.comment-write{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.comment-write textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;min-height:70px;margin-bottom:8px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-ov.hidden{display:none}
.modal{background:var(--surface2);border-radius:12px;box-shadow:var(--shadow-lg);padding:24px;width:100%;max-width:510px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--green);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--nav);color:#b8d8b8;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3);opacity:1}
#toast.hidden{opacity:0}

@media(max-width:600px){header{padding:0 8px;gap:8px}nav button{padding:4px 7px;font-size:11px}.logo{font-size:15px}main{padding:14px 10px 50px}#sync-badge{display:none!important}}
</style>
</head>
<body>
<header>
  <div class="logo">🏕 CampCheck</div>
  <nav id="nav">
    <button data-view="trips"     class="active">📅 일정</button>
    <button data-view="users">👤 참여자</button>
    <button data-view="items">🎒 품목</button>
    <button data-view="checklist">✅ 체크리스트</button>
    <button data-view="cross">🔍 교차점검</button>
    <button data-view="review">💬 후기</button>
  </nav>
  <div id="sync-badge" class="s-off" title="Google Drive 동기화 상태">☁️ 미연동</div>

  <!-- 로그인 영역 -->
  <div id="login-area">
    <button id="login-toggle" onclick="toggleLoginDrop()">👤 로그인 ▼</button>
    <div id="login-dropdown">
      <input id="ld-id" placeholder="아이디" autocomplete="username" />
      <input id="ld-pw" type="password" placeholder="비밀번호" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
      <div id="ld-err" style="font-size:12px;color:var(--red);margin-bottom:6px;display:none"></div>
      <div class="ld-btns">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="doLogin()">로그인</button>
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openRegisterModal()">회원가입</button>
      </div>
    </div>
    <div id="logged-in-info">
      <div id="logged-chip" class="user-chip-sm"></div>
      <button id="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
</header>

<main>
<!-- ══ 일정 ══ -->
<div id="view-trips" class="view active">
  <div class="page-title">📅 캠핑 일정 관리</div>
  <div id="trip-auth-gate" class="auth-gate" style="display:none">🔒 일정 생성은 로그인 후 가능합니다</div>
  <div class="stoggle" id="st-trip">
    <div class="stoggle-hd" onclick="toggleSt('st-trip')"><span>➕ 새 일정 추가</span><span class="sarrow">▼</span></div>
    <div class="stoggle-bd">
      <div class="form-row">
        <div class="form-group" style="flex:2"><label>일정 이름 *</label><input id="tf-name" placeholder="예: 여름 계곡 캠핑" /></div>
        <div class="form-group"><label>장소</label><input id="tf-loc" placeholder="예: 가평 용소캠핑장" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>출발일 *</label><input id="tf-start" type="date" /></div>
        <div class="form-group"><label>귀가일</label><input id="tf-end" type="date" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>참여자</label>
          <div id="tf-parts" style="display:flex;gap:6px;flex-wrap:wrap;min-height:36px;padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);align-items:center">
            <span style="color:var(--muted);font-size:12px">참여자를 먼저 등록하세요</span>
          </div>
        </div>
        <div class="form-group" style="flex:2"><label>메모</label><input id="tf-note" placeholder="장비 점검, 예약 확인 등" /></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="saveTrip()">일정 저장</button></div>
    </div>
  </div>
  <div class="trips-grid" id="trips-grid"></div>
</div>

<!-- ══ 참여자 ══ -->
<div id="view-users" class="view">
  <div class="page-title">👤 참여자 관리</div>
  <div id="user-auth-gate" class="auth-gate" style="display:none">🔒 참여자 등록은 관리자만 가능합니다</div>
  <div class="stoggle" id="st-user">
    <div class="stoggle-hd" onclick="toggleSt('st-user')"><span>➕ 참여자 추가 (관리자)</span><span class="sarrow">▼</span></div>
    <div class="stoggle-bd">
      <div class="form-row">
        <div class="form-group" style="flex:2"><label>이름 *</label><input id="uf-name" placeholder="예: 홍길동" /></div>
        <div class="form-group" style="flex:0 0 80px"><label>색상</label><input id="uf-color" type="color" value="#3a5a40" style="height:38px;padding:2px 4px;cursor:pointer" /></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="saveUser()">저장</button></div>
    </div>
  </div>
  <div class="users-grid" id="users-grid"></div>
</div>

<!-- ══ 품목 ══ -->
<div id="view-items" class="view">
  <div class="page-title">🎒 품목 관리</div>
  <div class="item-tabs" id="item-tabs"></div>
  <div class="stoggle" id="st-item">
    <div class="stoggle-hd" onclick="toggleSt('st-item')"><span>➕ 품목 추가</span><span class="sarrow">▼</span></div>
    <div class="stoggle-bd">
      <div id="item-auth-gate" class="auth-gate" style="display:none">🔒 로그인 후 본인 품목을 추가할 수 있습니다</div>
      <div class="form-row">
        <div class="form-group" style="flex:2"><label>품목명 *</label><input id="if-name" placeholder="예: 텐트, 침낭, 버너..." /></div>
        <div class="form-group"><label>카테고리</label>
          <select id="if-cat">
            <option>텐트/거처</option><option>침구</option><option>주방/취사</option>
            <option>식재료</option><option>의류</option><option>세면/위생</option>
            <option>조명/전기</option><option>응급/안전</option><option>놀이/레저</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 70px"><label>수량</label><input id="if-qty" type="number" value="1" min="1" /></div>
        <div class="form-group" style="flex:0 0 60px"><label>단위</label><input id="if-unit" value="개" /></div>
        <div class="form-group"><label>메모</label><input id="if-note" placeholder="참고사항" /></div>
      </div>
      <div class="form-actions"><button class="btn btn-primary" onclick="saveItem()">품목 저장</button></div>
    </div>
  </div>
  <div id="items-list"></div>
</div>

<!-- ══ 체크리스트 ══ -->
<div id="view-checklist" class="view">
  <div class="page-title">✅ 체크리스트</div>
  <div class="cl-top">
    <div class="form-group" style="min-width:200px"><label>캠핑 일정</label>
      <select id="cl-trip" onchange="onClTripChange()"><option value="">-- 일정 선택 --</option></select>
    </div>
    <div class="form-group" style="min-width:150px"><label>참여자</label>
      <select id="cl-user" onchange="loadChecklist()"><option value="">-- 참여자 선택 --</option></select>
    </div>
  </div>
  <div id="cl-content"></div>
</div>

<!-- ══ 교차점검 ══ -->
<div id="view-cross" class="view">
  <div class="page-title">🔍 교차 점검</div>
  <div style="margin-bottom:16px">
    <div class="form-group" style="max-width:270px"><label>캠핑 일정</label>
      <select id="cr-trip" onchange="loadCross()"><option value="">-- 일정 선택 --</option></select>
    </div>
  </div>
  <div id="cr-content"></div>
</div>

<!-- ══ 후기 ══ -->
<div id="view-review" class="view">
  <div class="page-title">💬 캠핑 후기</div>
  <div style="margin-bottom:16px">
    <div class="form-group" style="max-width:270px"><label>캠핑 일정</label>
      <select id="rv-trip" onchange="loadReview()"><option value="">-- 일정 선택 --</option></select>
    </div>
  </div>
  <div id="rv-content"></div>
</div>
</main>

<div class="modal-ov hidden" id="modal-ov" onclick="closeModal(event)">
  <div class="modal" id="modal-body"></div>
</div>
<div id="toast" class="hidden"></div>

<script>
// ═══════════════════════════════════════════
// BASE PATH & 상수
// ═══════════════════════════════════════════
const BASE  = window.location.pathname.replace(/\/+$/, '');
const CATS  = ['텐트/거처','침구','주방/취사','식재료','의류','세면/위생','조명/전기','응급/안전','놀이/레저','기타'];
const ICONS = {'텐트/거처':'⛺','침구':'🛌','주방/취사':'🍳','식재료':'🥘','의류':'👕','세면/위생':'🧴','조명/전기':'💡','응급/안전':'🚑','놀이/레저':'🎮','기타':'🧰'};

// ═══════════════════════════════════════════
// AUTH STATE
// ═══════════════════════════════════════════
const AUTH = { token: null, user: null };

function loadAuth() {
  const t = localStorage.getItem('campcheck_token');
  if (!t) return;
  try {
    const payload = JSON.parse(atob(t.split('.')[1]));
    if (payload.exp * 1000 < Date.now()) { localStorage.removeItem('campcheck_token'); return; }
    AUTH.token = t;
    AUTH.user  = payload;
  } catch { localStorage.removeItem('campcheck_token'); }
}
loadAuth();

function isAdmin()     { return AUTH.user?.role === 'admin'; }
function isLoggedIn()  { return !!AUTH.user; }
function myUserId()    { return AUTH.user?.userId; }

function applyAuthUI() {
  const toggle    = document.getElementById('login-toggle');
  const loggedDiv = document.getElementById('logged-in-info');
  const chip      = document.getElementById('logged-chip');
  if (AUTH.user) {
    toggle.style.display    = 'none';
    loggedDiv.style.display = 'flex';
    const u    = S.users.find(u => u.id === AUTH.user.userId);
    const color = u?.color || '#4a7c59';
    chip.innerHTML = `<span style="background:${color};width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${AUTH.user.name[0]}</span>
      ${esc(AUTH.user.name)} ${isAdmin() ? '<span class="role-badge">관리자</span>' : ''}`;
    chip.style.background = color;
  } else {
    toggle.style.display    = 'flex';
    loggedDiv.style.display = 'none';
  }
  // 권한 게이트 표시
  document.getElementById('trip-auth-gate').style.display  = isLoggedIn() ? 'none' : 'flex';
  document.getElementById('user-auth-gate').style.display  = isAdmin() ? 'none' : 'flex';
  document.getElementById('item-auth-gate').style.display  = isLoggedIn() ? 'none' : 'flex';
  // 일정 추가 폼 표시
  const tripToggle = document.querySelector('#st-trip .stoggle-hd');
  if (tripToggle) tripToggle.style.display = isLoggedIn() ? 'flex' : 'none';
  // 참여자 추가 폼
  const userToggle = document.querySelector('#st-user .stoggle-hd');
  if (userToggle) userToggle.style.display = isAdmin() ? 'flex' : 'none';
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = { users: [], items: [], trips: [], checks: {}, itemsUser: null };

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (AUTH.token) h['Authorization'] = `Bearer ${AUTH.token}`;
  return h;
}
const api = {
  get:    p    => fetch(`${BASE}/api${p}`, { headers: headers() }).then(r => r.json()),
  post:  (p,d) => fetch(`${BASE}/api${p}`, { method:'POST',   headers: headers(), body: JSON.stringify(d) }).then(r => r.json()),
  put:   (p,d) => fetch(`${BASE}/api${p}`, { method:'PUT',    headers: headers(), body: JSON.stringify(d) }).then(r => r.json()),
  delete: p    => fetch(`${BASE}/api${p}`, { method:'DELETE', headers: headers() }).then(r => r.json()),
};

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = '';
  el.style.background = type==='err' ? 'var(--red)' : 'var(--nav)';
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.add('hidden'), 2400);
}

// ═══════════════════════════════════════════
// SYNC BADGE
// ═══════════════════════════════════════════
async function pollSync() {
  try {
    const s = await api.get('/status');
    const b = document.getElementById('sync-badge');
    if (!s.driveEnabled) { b.style.display='none'; return; }
    b.style.display='flex';
    if (s.syncStatus==='syncing')         { b.className='s-sync'; b.innerHTML='<span class="spin">↻</span> 동기화 중'; }
    else if (s.syncStatus==='error')      { b.className='s-err';  b.innerHTML='⚠️ 오류'; }
    else if (s.pendingChanges.length > 0) { b.className='s-pend'; b.innerHTML=`🕐 대기 ${s.pendingChanges.length}건`; }
    else if (s.lastSyncAt)                { b.className='s-ok';   b.innerHTML=`☁️ ${new Date(s.lastSyncAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`; }
    else                                  { b.className='s-ok';   b.innerHTML='☁️ 연동됨'; }
  } catch {}
}
pollSync(); setInterval(pollSync, 10000);

// ═══════════════════════════════════════════
// LOGIN DROPDOWN
// ═══════════════════════════════════════════
function toggleLoginDrop() {
  document.getElementById('login-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('login-area').contains(e.target))
    document.getElementById('login-dropdown').classList.remove('open');
});

async function doLogin() {
  const loginId  = document.getElementById('ld-id').value.trim();
  const password = document.getElementById('ld-pw').value;
  const errEl    = document.getElementById('ld-err');
  errEl.style.display = 'none';
  if (!loginId || !password) { errEl.textContent='아이디와 비밀번호를 입력하세요'; errEl.style.display='block'; return; }
  const res = await api.post('/auth/login', { loginId, password });
  if (res.error) { errEl.textContent = res.error; errEl.style.display='block'; return; }
  AUTH.token = res.token; AUTH.user = res.user;
  localStorage.setItem('campcheck_token', res.token);
  document.getElementById('ld-id').value = '';
  document.getElementById('ld-pw').value = '';
  document.getElementById('login-dropdown').classList.remove('open');
  applyAuthUI(); renderTrips(); renderUsers(); renderItems();
  toast(`${res.user.name}님 환영합니다 ${res.user.role==='admin'?'(관리자)':''}`);
}

function doLogout() {
  AUTH.token = null; AUTH.user = null;
  localStorage.removeItem('campcheck_token');
  applyAuthUI(); renderTrips(); renderUsers(); renderItems();
  toast('로그아웃 되었습니다');
}

function openRegisterModal() {
  document.getElementById('login-dropdown').classList.remove('open');
  openModal(`
    <div class="modal-title">👤 회원가입</div>
    <div class="form-row">
      <div class="form-group"><label>이름 *</label><input id="rg-name" placeholder="실명 입력" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>아이디 *</label><input id="rg-id" placeholder="영문+숫자" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>비밀번호 *</label><input id="rg-pw" type="password" placeholder="6자 이상" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>비밀번호 확인 *</label><input id="rg-pw2" type="password" /></div>
    </div>
    <div id="rg-err" style="font-size:12px;color:var(--red);display:none;margin-top:4px"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">기존 참여자와 같은 이름으로 가입하면 자동 연결됩니다</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="doRegister()">가입하기</button>
    </div>`);
}

async function doRegister() {
  const name  = document.getElementById('rg-name').value.trim();
  const loginId = document.getElementById('rg-id').value.trim();
  const pw    = document.getElementById('rg-pw').value;
  const pw2   = document.getElementById('rg-pw2').value;
  const errEl = document.getElementById('rg-err');
  errEl.style.display = 'none';
  if (!name || !loginId || !pw) { errEl.textContent='모든 항목을 입력하세요'; errEl.style.display='block'; return; }
  if (pw !== pw2) { errEl.textContent='비밀번호가 일치하지 않습니다'; errEl.style.display='block'; return; }
  if (pw.length < 6) { errEl.textContent='비밀번호는 6자 이상이어야 합니다'; errEl.style.display='block'; return; }
  const res = await api.post('/auth/register', { name, loginId, password: pw });
  if (res.error) { errEl.textContent=res.error; errEl.style.display='block'; return; }
  AUTH.token = res.token; AUTH.user = res.user;
  localStorage.setItem('campcheck_token', res.token);
  closeModal();
  await loadAll();
  applyAuthUI();
  toast(`${res.user.name}님 가입 완료!`);
}

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('button[data-view]');
  if (!btn) return;
  const v = btn.dataset.view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if (v==='items')     renderItems();
  if (v==='checklist') initChecklist();
  if (v==='cross')     { populateTripSelects(); }
  if (v==='review')    { populateTripSelects(); }
});

function toggleSt(id) {
  const bd=document.querySelector(`#${id} .stoggle-bd`), ar=document.querySelector(`#${id} .sarrow`);
  bd.classList.toggle('open'); ar.classList.toggle('open', bd.classList.contains('open'));
}

// ═══════════════════════════════════════════
// INIT LOAD
// ═══════════════════════════════════════════
async function loadAll() {
  [S.users, S.items, S.trips] = await Promise.all([api.get('/users'), api.get('/items'), api.get('/trips')]);
  renderTrips(); renderUsers(); populateTripSelects();
}

// ═══════════════════════════════════════════
// USERS
// ═══════════════════════════════════════════
function renderUsers() {
  const g = document.getElementById('users-grid');
  g.innerHTML = !S.users.length
    ? '<div class="empty"><div class="empty-icon">👤</div><p>등록된 참여자가 없습니다.</p></div>'
    : S.users.map(u => `
      <div class="user-card">
        <div class="user-dot" style="background:${u.color}">${u.name[0]}</div>
        <div class="user-info">
          <div class="user-name">${esc(u.name)} ${u.hasAccount ? '<span class="badge badge-green" style="font-size:10px">계정있음</span>' : ''}</div>
          <div class="user-meta">품목 ${S.items.filter(i=>i.userId===u.id).length}개${u.loginId ? ` · ${u.loginId}` : ''}</div>
        </div>
        ${isAdmin() ? `<button class="btn-icon" onclick="openEditUser('${u.id}')">✏️</button>
        <button class="btn-icon" onclick="deleteUser('${u.id}','${esc(u.name)}')">🗑️</button>` : ''}
      </div>`).join('');
  refreshTripParticipants();
  applyAuthUI();
}

async function saveUser() {
  if (!isAdmin()) { toast('관리자만 참여자를 등록할 수 있습니다','err'); return; }
  const name=document.getElementById('uf-name').value.trim(), color=document.getElementById('uf-color').value;
  if (!name) { toast('이름을 입력하세요','err'); return; }
  const u = await api.post('/users', {name,color});
  if (u.error) { toast(u.error,'err'); return; }
  S.users.push(u); document.getElementById('uf-name').value='';
  renderUsers(); renderItems(); toast(`${u.name} 추가 완료`);
}

function openEditUser(id) {
  const u=S.users.find(x=>x.id===id);
  openModal(`<div class="modal-title">✏️ 참여자 수정</div>
    <div class="form-row">
      <div class="form-group" style="flex:2"><label>이름</label><input id="eu-name" value="${esc(u.name)}" /></div>
      <div class="form-group" style="flex:0 0 80px"><label>색상</label><input id="eu-color" type="color" value="${u.color}" style="height:38px;padding:2px 4px" /></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="updateUser('${id}')">저장</button></div>`);
}
async function updateUser(id) {
  const u=await api.put(`/users/${id}`,{name:document.getElementById('eu-name').value.trim(),color:document.getElementById('eu-color').value});
  if (u.error){toast(u.error,'err');return;}
  S.users[S.users.findIndex(x=>x.id===id)]=u; closeModal(); renderUsers(); renderTrips(); toast('수정 완료');
}
async function deleteUser(id,name) {
  if(!confirm(`"${name}" 참여자를 삭제할까요?`))return;
  await api.delete(`/users/${id}`);
  S.users=S.users.filter(u=>u.id!==id); S.items=S.items.filter(i=>i.userId!==id);
  S.trips.forEach(t=>{t.participants=(t.participants||[]).filter(p=>p!==id)});
  renderUsers(); renderItems(); renderTrips(); toast(`${name} 삭제 완료`);
}
function refreshTripParticipants() {
  const c=document.getElementById('tf-parts');
  if (!S.users.length){c.innerHTML='<span style="color:var(--muted);font-size:12px">참여자를 먼저 등록하세요</span>';return;}
  const checked=new Set([...c.querySelectorAll('input:checked')].map(el=>el.value));
  c.innerHTML=S.users.map(u=>`<label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;border-radius:4px;user-select:none">
    <input type="checkbox" value="${u.id}" ${checked.has(u.id)?'checked':''} />
    <span class="user-dot" style="background:${u.color};width:20px;height:20px;font-size:10px">${u.name[0]}</span>
    <span style="font-size:12px">${esc(u.name)}</span></label>`).join('');
}

// ═══════════════════════════════════════════
// ITEMS
// ═══════════════════════════════════════════
function renderItems() {
  const tabs=document.getElementById('item-tabs');
  if (!S.users.length){tabs.innerHTML='<span style="color:var(--muted);font-size:13px">참여자를 먼저 등록해주세요</span>';document.getElementById('items-list').innerHTML='';return;}
  if (!S.itemsUser||!S.users.find(u=>u.id===S.itemsUser)) S.itemsUser=S.users[0].id;
  tabs.innerHTML=S.users.map(u=>`<div class="item-tab ${u.id===S.itemsUser?'active':''}" onclick="switchItemUser('${u.id}')">
    <span style="background:${u.color};width:9px;height:9px;border-radius:50%;display:inline-block"></span>${esc(u.name)}</div>`).join('');
  renderItemList();
  document.getElementById('item-auth-gate').style.display = isLoggedIn() ? 'none' : 'flex';
  const stBody = document.querySelector('#st-item .stoggle-hd');
  if (stBody) stBody.style.display = isLoggedIn() ? 'flex' : 'none';
}
function switchItemUser(id){S.itemsUser=id;renderItems();}
function renderItemList() {
  const c=document.getElementById('items-list');
  const myItems=S.items.filter(i=>i.userId===S.itemsUser);
  const canEdit=isAdmin()||(isLoggedIn()&&S.itemsUser===myUserId());
  if (!myItems.length){c.innerHTML='<div class="empty"><div class="empty-icon">🎒</div><p>등록된 품목이 없습니다.</p></div>';return;}
  const byCat={};
  myItems.forEach(i=>(byCat[i.category]??=[]).push(i));
  c.innerHTML=CATS.filter(cat=>byCat[cat]).map(cat=>`
    <div style="margin-bottom:14px">
      <div class="cat-label">${ICONS[cat]||''} ${cat}</div>
      ${byCat[cat].map(item=>`<div class="item-row">
        <span style="flex:1;font-weight:500">${esc(item.name)}</span>
        <span style="font-family:'Courier Prime',monospace;font-size:12px;color:var(--muted)">${item.quantity}${item.unit}</span>
        ${item.note?`<span style="font-size:11px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝${esc(item.note)}</span>`:''}
        ${canEdit?`<button class="btn-icon" onclick="openEditItem('${item.id}')">✏️</button><button class="btn-icon" onclick="deleteItem('${item.id}','${esc(item.name)}')">🗑️</button>`:''}
      </div>`).join('')}
    </div>`).join('');
}
async function saveItem() {
  if (!isLoggedIn()){toast('로그인이 필요합니다','err');return;}
  const targetUser = isAdmin() ? S.itemsUser : myUserId();
  if (!isAdmin() && S.itemsUser !== myUserId()){toast('본인 품목만 등록할 수 있습니다','err');return;}
  const name=document.getElementById('if-name').value.trim();
  if (!name){toast('품목명을 입력하세요','err');return;}
  const item=await api.post('/items',{userId:targetUser,name,category:document.getElementById('if-cat').value,quantity:document.getElementById('if-qty').value,unit:document.getElementById('if-unit').value,note:document.getElementById('if-note').value});
  if (item.error){toast(item.error,'err');return;}
  S.items.push(item); document.getElementById('if-name').value=''; document.getElementById('if-note').value='';
  renderItemList(); toast(`${item.name} 추가 완료`);
}
function openEditItem(id) {
  const it=S.items.find(x=>x.id===id);
  const catOpts=CATS.map(c=>`<option ${c===it.category?'selected':''}>${c}</option>`).join('');
  openModal(`<div class="modal-title">✏️ 품목 수정</div>
    <div class="form-row">
      <div class="form-group" style="flex:2"><label>품목명</label><input id="ei-name" value="${esc(it.name)}" /></div>
      <div class="form-group"><label>카테고리</label><select id="ei-cat">${catOpts}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:0 0 70px"><label>수량</label><input id="ei-qty" type="number" value="${it.quantity}" /></div>

async function updateItem(id) {

function populateTripSelects() {
  const sorted=[...S.trips].sort((a,b)=>b.startDate.localeCompare(a.startDate));
  const opts=sorted.map(t=>`<option value="${t.id}">${esc(t.name)} (${t.startDate})</option>`).join('');
  ['cl-trip','cr-trip','rv-trip'].forEach(id=>{const sel=document.getElementById(id),cur=sel.value;sel.innerHTML='<option value="">-- 일정 선택 --</option>'+opts;if(cur)sel.value=cur;});
}

function renderTrips() {
  const g=document.getElementById('trips-grid');
  const today=new Date().toISOString().slice(0,10);
  const sorted=[...S.trips].sort((a,b)=>a.startDate.localeCompare(b.startDate));
  if (!sorted.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📅</div><p>등록된 캠핑 일정이 없습니다.</p></div>';return;}
  g.innerHTML=sorted.map(t=>{
    const past=t.endDate<today,upcoming=t.startDate>today;
    const cancelled=t.note?.includes('취소됨');
    const status=cancelled?'<span class="badge badge-red">취소됨</span>':past?'<span class="badge badge-gray">종료</span>':upcoming?'<span class="badge badge-blue">예정</span>':'<span class="badge badge-green">진행중</span>';
    const parts=(t.participants||[]).map(uid=>{const u=S.users.find(x=>x.id===uid);return u?`<span class="user-dot" style="background:${u.color};width:22px;height:22px;font-size:10px" title="${esc(u.name)}">${u.name[0]}</span>`:''}).join('');
    const isMember=(t.participants||[]).includes(myUserId());
    const dateStr=t.endDate&&t.endDate!==t.startDate?`${t.startDate} ~ ${t.endDate}`:t.startDate;
    const historyLast=t.history?.slice(-1)[0];
    return `<div class="trip-card ${cancelled?'cancelled':''}">
      <div class="trip-card-actions">
        ${isLoggedIn()&&!cancelled?`<button class="btn btn-ghost btn-sm" onclick="openEditTrip('${t.id}');event.stopPropagation()">✏️</button>`:''}
        ${isAdmin()?`<button class="btn btn-danger btn-sm" onclick="deleteTrip('${t.id}','${esc(t.name)}');event.stopPropagation()">🗑️</button>`:''}
        ${isLoggedIn()&&!isAdmin()&&!cancelled?`<button class="btn btn-warn btn-sm" onclick="cancelTrip('${t.id}');event.stopPropagation()">취소처리</button>`:''}
      </div>
      <div class="trip-date">${dateStr}</div>
      <div class="trip-name">${esc(t.name)}</div>
      <div class="trip-loc">${t.location?'📍 '+esc(t.location):''}</div>
      <div class="trip-footer">
        ${status}
        <span style="display:flex;gap:3px">${parts}</span>
        <span class="badge badge-gray">${(t.participants||[]).length}명</span>
        ${isLoggedIn()&&!cancelled?isMember?`<button class="btn btn-ghost btn-sm" onclick="leaveTrip('${t.id}')">참여취소</button>`:`<button class="btn btn-primary btn-sm" onclick="joinTrip('${t.id}')">참여하기</button>`:''}
      </div>
      ${historyLast?`<div class="trip-history">${esc(historyLast.name)} · ${historyLast.action} · ${new Date(historyLast.at).toLocaleDateString('ko-KR')}</div>`:''}
    </div>`;
  }).join('');
  populateTripSelects();
  applyAuthUI();
}

async function saveTrip() {
  if (!isLoggedIn()){toast('로그인이 필요합니다','err');return;}
  const name=document.getElementById('tf-name').value.trim(),start=document.getElementById('tf-start').value;
  if (!name||!start){toast('일정 이름과 출발일은 필수입니다','err');return;}
  const parts=[...document.querySelectorAll('#tf-parts input:checked')].map(el=>el.value);
  const t=await api.post('/trips',{name,startDate:start,endDate:document.getElementById('tf-end').value||start,location:document.getElementById('tf-loc').value.trim(),note:document.getElementById('tf-note').value.trim(),participants:parts});
  if (t.error){toast(t.error,'err');return;}
  S.trips.push(t); ['tf-name','tf-loc','tf-note','tf-start','tf-end'].forEach(id=>document.getElementById(id).value='');
  renderTrips(); toast(`"${t.name}" 일정 추가 완료`);
}

function openEditTrip(id) {

    <div class="form-group"><label>메모</label><input id="et-note" value="${esc(t.note||'')}" /></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="updateTrip('${id}')">저장</button></div>`);

async function updateTrip(id) {
  const partsEl=document.getElementById('et-parts');

}
async function cancelTrip(id) {
  if(!confirm('이 일정을 취소 처리할까요? (삭제되지 않고 취소됨으로 표시됩니다)'))return;

}
async function deleteTrip(id,name) {
  if(!confirm(`"${name}" 일정과 모든 데이터를 삭제할까요?`))return;
  const r=await api.delete(`/trips/${id}`);
  if(r.error){toast(r.error,'err');return;}
  S.trips=S.trips.filter(t=>t.id!==id); delete S.checks[id]; renderTrips(); toast(`"${name}" 삭제 완료`);
}
async function joinTrip(id) {
  const t=await api.put(`/trips/${id}/join`,{});
  if(t.error){toast(t.error,'err');return;}
  S.trips[S.trips.findIndex(x=>x.id===id)]=t; renderTrips(); toast('일정에 참여했습니다');

async function leaveTrip(id) {
  const t=await api.delete(`/trips/${id}/join`);

function initChecklist() {

function onClTripChange() {
  const trip=S.trips.find(t=>t.id===document.getElementById('cl-trip').value);
  const cu=document.getElementById('cl-user');
  if(trip){const parts=(trip.participants||[]).map(uid=>S.users.find(u=>u.id===uid)).filter(Boolean);cu.innerHTML='<option value="">-- 참여자 선택 --</option>'+parts.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('');}
  else cu.innerHTML='<option value="">-- 참여자 선택 --</option>';
  document.getElementById('cl-content').innerHTML='';
}
async function loadChecklist() {
  const tripId=document.getElementById('cl-trip').value, userId=document.getElementById('cl-user').value, c=document.getElementById('cl-content');
  if(!tripId||!userId){c.innerHTML='';return;}
  S.checks[tripId]=await api.get(`/trips/${tripId}/checks`);
  const chk=(S.checks[tripId]||{})[userId]||{};
  const myItems=S.items.filter(i=>i.userId===userId);
  const user=S.users.find(u=>u.id===userId);
  const canEdit=isAdmin()||(isLoggedIn()&&userId===myUserId());
  if (!myItems.length){c.innerHTML=`<div class="empty"><div class="empty-icon">🎒</div><p>${esc(user?.name)}의 품목이 없습니다.</p></div>`;return;}
  const totalPlanned=myItems.filter(i=>chk[i.id]?.planned).length, totalPacked=myItems.filter(i=>chk[i.id]?.packed).length, total=myItems.length;
  const byCat={};
  myItems.forEach(i=>(byCat[i.category]??=[]).push(i));
  c.innerHTML=`<div class="cl-stats">
    <div style="flex:1;min-width:150px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:var(--yellow)">📋 챙길 예정</span><span style="font-size:12px;color:var(--muted)">${totalPlanned}/${total}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="background:var(--yellow);width:${total?Math.round(totalPlanned/total*100):0}%"></div></div>
    </div>
    <div style="flex:1;min-width:150px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:var(--green)">✅ 실제 챙김</span><span style="font-size:12px;color:var(--muted)">${totalPacked}/${total}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${total?Math.round(totalPacked/total*100):0}%"></div></div>
    </div>
    <div style="display:flex;gap:14px">
      <div style="text-align:center"><div class="stat-num">${total-totalPacked}</div><div class="stat-lbl">미챙김</div></div>
      <div style="text-align:center"><div class="stat-num">${totalPacked}</div><div class="stat-lbl">완료</div></div>
    </div>
  </div>
  ${!canEdit?'<div class="auth-gate">🔒 본인 체크리스트만 수정할 수 있습니다</div>':''}
  ${CATS.filter(cat=>byCat[cat]).map(cat=>`<div style="margin-bottom:14px">
    <div class="cat-label">${ICONS[cat]||''} ${cat}</div>
    ${byCat[cat].map(item=>{const ck=chk[item.id]||{planned:false,packed:false};const cls=ck.packed?'is-packed':ck.planned?'is-planned':'';
      return `<div class="check-row ${cls}">
        <div style="flex:1"><div class="check-item-name">${esc(item.name)}</div><div class="check-item-meta">${item.quantity}${item.unit}${item.note?' · '+esc(item.note):''}</div></div>
        <button class="ck-btn ${ck.planned?'on-plan':''}" onclick="toggleCheck('${tripId}','${userId}','${item.id}','planned')" ${!canEdit?'disabled':''}>📋 ${ck.planned?'예정됨':'예정'}</button>
        <button class="ck-btn ${ck.packed?'on-pack':''}" onclick="toggleCheck('${tripId}','${userId}','${item.id}','packed')" ${!canEdit?'disabled':''}>✅ ${ck.packed?'챙겼음':'챙기기'}</button>
      </div>`;}).join('')}
  </div>`).join('')}`;
}
async function toggleCheck(tripId,userId,itemId,field) {
  const cur=((S.checks[tripId]||{})[userId]||{})[itemId]||{planned:false,packed:false};
  const body={userId,itemId};
  if(field==='packed'){body.packed=!cur.packed;if(!cur.packed)body.planned=true;}
  else{body.planned=!cur.planned;if(!body.planned)body.packed=false;}
  const res=await api.put(`/trips/${tripId}/checks`,body);
  if(res.error){toast(res.error,'err');return;}
  S.checks[tripId]=res; loadChecklist();
}

// ═══════════════════════════════════════════
// CROSS CHECK (기존 유지)
// ═══════════════════════════════════════════
async function loadCross() {
  const tripId=document.getElementById('cr-trip').value, c=document.getElementById('cr-content');
  if(!tripId){c.innerHTML='';return;}
  const trip=S.trips.find(t=>t.id===tripId);
  S.checks[tripId]=await api.get(`/trips/${tripId}/checks`);
  const tc=S.checks[tripId]||{};
  const parts=(trip.participants||[]).map(uid=>S.users.find(u=>u.id===uid)).filter(Boolean);
  if(!parts.length){c.innerHTML='<div class="empty"><div class="empty-icon">👤</div><p>이 일정에 참여자가 없습니다.</p></div>';return;}
  const pData=parts.map(u=>{const items=S.items.filter(i=>i.userId===u.id),checks=tc[u.id]||{},planned=items.filter(i=>checks[i.id]?.planned),packed=items.filter(i=>checks[i.id]?.packed);return{u,items,checks,planned,packed};});
  const nameMap={};pData.forEach(p=>p.planned.forEach(item=>(nameMap[item.name]??=[]).push(p.u)));
  const dups=Object.entries(nameMap).filter(([,users])=>users.length>1);
  const tripItems=S.items.filter(i=>(trip.participants||[]).includes(i.userId));
  const allCats=new Set(tripItems.map(i=>i.category));
  const coveredCats=new Set();pData.forEach(p=>p.planned.forEach(item=>coveredCats.add(item.category)));
  const missingCats=[...allCats].filter(c=>!coveredCats.has(c));
  const byCat={};tripItems.forEach(i=>(byCat[i.category]??=[]).push(i));
  Object.keys(byCat).forEach(cat=>{const seen=new Set();byCat[cat]=byCat[cat].filter(i=>{if(seen.has(i.name))return false;seen.add(i.name);return true;});});
  c.innerHTML=`<div class="cross-cards">${pData.map(p=>{const total=p.items.length;return`<div class="p-card">
    <div class="p-card-name"><div class="user-dot" style="background:${p.u.color}">${p.u.name[0]}</div>${esc(p.u.name)}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:7px">품목 ${total} · 예정 ${p.planned.length} · 완료 ${p.packed.length}</div>
    <div class="progress-bar" style="margin-bottom:5px"><div class="progress-fill" style="background:var(--yellow);width:${total?Math.round(p.planned.length/total*100):0}%"></div></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${total?Math.round(p.packed.length/total*100):0}%"></div></div>
  </div>`;}).join('')}</div>
  <div style="margin-bottom:14px">${dups.map(([name,users])=>`<div class="warn-item warn-dup"><span>🔄</span><div><strong>중복:</strong> ${esc(name)} — ${users.map(u=>esc(u.name)).join(', ')}</div></div>`).join('')}
  ${missingCats.map(cat=>`<div class="warn-item warn-miss"><span>⚠️</span><div><strong>미예정:</strong> ${ICONS[cat]||''} ${cat}</div></div>`).join('')}
  ${!dups.length&&!missingCats.length&&pData.some(p=>p.planned.length)?`<div class="warn-item warn-ok"><span>✅</span><strong>이상 없음</strong></div>`:''}</div>
  <div style="overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border2)">
    <table class="cross-tbl"><thead><tr><th>품목</th>${parts.map(p=>`<th><span style="background:${p.color};padding:2px 8px;border-radius:99px;color:#fff">${p.name[0]} ${esc(p.name)}</span></th>`).join('')}</tr></thead>
    <tbody>${CATS.filter(cat=>byCat[cat]).map(cat=>`<tr class="cat-tr"><td colspan="${parts.length+1}">${ICONS[cat]||''} ${cat}</td></tr>`+byCat[cat].map(item=>`<tr><td>${esc(item.name)}</td>${parts.map(p=>{const mi=S.items.find(i=>i.userId===p.id&&i.name===item.name);if(!mi)return'<td><span style="color:var(--border)">—</span></td>';const ck=(tc[p.id]||{})[mi.id]||{};return ck.packed?'<td><span style="color:var(--green)">✅</span></td>':ck.planned?'<td><span style="color:var(--yellow)">📋</span></td>':'<td><span style="color:var(--border)">○</span></td>';}).join('')}</tr>`).join('')).join('')}</tbody>
    </table>
  </div>`;
}

    <div style="margin-bottom:14px;padding:10px 14px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2)">

}

function buildCommentTree(comments, tripId) {
  if (!comments.length) return '<div class="empty"><div class="empty-icon">💬</div><p>아직 후기가 없습니다. 첫 후기를 남겨보세요!</p></div>';
  const roots=comments.filter(c=>c.parentId===null).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
  function renderC(c) {
    const children=comments.filter(x=>x.parentId===c.id).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
    const canEdit=isAdmin()||(isLoggedIn()&&c.authorId===myUserId());
    const dt=new Date(c.createdAt).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="comment depth-${c.depth}">
      <div class="comment-header">
        <span class="comment-author">${esc(c.authorName)}</span>
        <span class="comment-date">${dt}</span>
        ${c.edited?'<span class="edited-mark">(수정됨)</span>':''}
      </div>
      <div class="comment-content" id="cc-${c.id}">${esc(c.content)}</div>
      <div class="comment-actions">
        ${c.depth<2&&isLoggedIn()?`<button onclick="toggleReplyForm('${c.id}','${c.tripId}')">↩ 답글</button>`:''}
        ${canEdit?`<button onclick="openCommentEdit('${c.id}')">✏️ 수정</button>`:''}
        ${isAdmin()?`<button class="del-btn" onclick="deleteComment('${c.id}','${c.tripId}')">🗑️ 삭제</button>`:''}
      </div>
      <div id="reply-form-${c.id}" style="display:none" class="reply-form">
        <textarea id="reply-text-${c.id}" placeholder="답글을 입력하세요..."></textarea>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="toggleReplyForm('${c.id}','${c.tripId}')">취소</button>
          <button class="btn btn-primary btn-sm" onclick="postComment('${c.tripId}','${c.id}')">답글 등록</button>
        </div>
      </div>
      ${children.map(ch=>renderC(ch)).join('')}
    </div>`;
  }
  return roots.map(r=>renderC(r)).join('');
}

function toggleReplyForm(commentId, tripId) {
  const el=document.getElementById(`reply-form-${commentId}`);
  el.style.display=el.style.display==='none'?'block':'none';
}

async function postComment(tripId, parentId) {
  const textEl=parentId?document.getElementById(`reply-text-${parentId}`):document.getElementById('new-comment-text');
  const content=textEl?.value?.trim();
  if(!content){toast('내용을 입력하세요','err');return;}
  const res=await api.post('/comments',{tripId,parentId,content});
  if(res.error){toast(res.error,'err');return;}
  textEl.value=''; loadReview();
}

function openCommentEdit(commentId) {
  const el=document.getElementById(`cc-${commentId}`);
  const orig=el.textContent;
  el.innerHTML=`<div style="margin-top:4px">
    <textarea id="edit-text-${commentId}" style="width:100%;min-height:60px;border:1px solid var(--border);border-radius:6px;padding:7px;font-family:inherit;font-size:13px;resize:vertical">${esc(orig)}</textarea>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:5px">
      <button class="btn btn-ghost btn-sm" onclick="cancelCommentEdit('${commentId}','${esc(orig)}')">취소</button>
      <button class="btn btn-primary btn-sm" onclick="submitCommentEdit('${commentId}')">저장</button>
    </div>
  </div>`;
}
function cancelCommentEdit(commentId, orig) {
  document.getElementById(`cc-${commentId}`).innerHTML=esc(orig);
}
async function submitCommentEdit(commentId) {
  const content=document.getElementById(`edit-text-${commentId}`)?.value?.trim();
  if(!content){toast('내용을 입력하세요','err');return;}
  const res=await api.put(`/comments/${commentId}`,{content});
  if(res.error){toast(res.error,'err');return;}
  document.getElementById(`cc-${commentId}`).textContent=res.content;
  toast('수정 완료');
}
async function deleteComment(commentId, tripId) {
  if(!confirm('댓글과 하위 답글을 모두 삭제할까요?'))return;
  const res=await api.delete(`/comments/${commentId}`);
  if(res.error){toast(res.error,'err');return;}
  toast(`${res.deleted}개 삭제 완료`); loadReview();
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-ov').classList.remove('hidden');}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-ov'))return;document.getElementById('modal-ov').classList.add('hidden');}

// ═══════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
loadAll().then(() => applyAuthUI());
